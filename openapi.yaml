openapi: 3.0.0
info:
  title: Browserful API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
  /connect:
    get:
      summary: Connect to the default browser session CDP WebSocket (launches if not running)
      operationId: connectDefaultSession
      responses:
        '101':
          description: WebSocket upgrade successful
  /connect/{sessionName}:
    get:
      summary: Connect to a named browser session CDP WebSocket (launches if not running)
      operationId: connectNamedSession
      parameters:
        - name: sessionName
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '101':
          description: WebSocket upgrade successful
  /sessions/{sessionName}:
    delete:
      summary: Close a browser session
      operationId: closeSession
      parameters:
        - name: sessionName
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '204':
          description: Session closed